zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: a19f1d3ddc234e06b4d7c9303fdbdb62
      template: 'Ruckus UnLeashed by SNMP'
      name: 'Ruckus UnLeashed by SNMP'
      description: |
        Monitoring Ruckus Unleashed APs via SNMP
        
        You can discuss this template or leave feedback on GitHub https://github.com/astraliens/zabbix-template-ruckus-unleashed
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 86e7132fbc2542b3bfe102657ed645fa
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 7d
          valuemap:
            name: 'Service state'
          tags:
            - tag: Application
              value: ICMP
          triggers:
            - uuid: 33f269d9d1c643a1ad6c20ca6cea2c9c
              expression: 'max(/Ruckus UnLeashed by SNMP/icmpping,#3)=0'
              name: '{HOST.NAME} is unavailable by ICMP'
              priority: AVERAGE
        - uuid: 09f59d2a195f4897801e5783af6761de
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 7d
          value_type: FLOAT
          units: '%'
          tags:
            - tag: Application
              value: ICMP
          triggers:
            - uuid: 6d731e71798c4846abba2c17daf9e8ac
              expression: 'min(/Ruckus UnLeashed by SNMP/icmppingloss,5m)>20'
              name: 'Ping loss is too high on {HOST.NAME}'
              priority: WARNING
              dependencies:
                - name: '{HOST.NAME} is unavailable by ICMP'
                  expression: 'max(/Ruckus UnLeashed by SNMP/icmpping,#3)=0'
        - uuid: 82888319d0384189b74c74647d9ee9c3
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 7d
          value_type: FLOAT
          units: s
          tags:
            - tag: Application
              value: ICMP
          triggers:
            - uuid: 8f7501d664fc4a9ab4d02c3ec0d3eeb6
              expression: 'avg(/Ruckus UnLeashed by SNMP/icmppingsec,5m)>0.5'
              name: 'Response time is too high on {HOST.NAME}'
              priority: WARNING
              dependencies:
                - name: '{HOST.NAME} is unavailable by ICMP'
                  expression: 'max(/Ruckus UnLeashed by SNMP/icmpping,#3)=0'
        - uuid: b0dba53abc054034bc685bbbe1c1ef26
          name: 'IP Address'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.2.0
          key: ruckus.Unleashed.System.AP.IP
          delay: 1h
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: ac30fc52d3ee4cd0a0e82431fd51fba0
          name: 'Total APs Capacity'
          type: CALCULATED
          key: ruckus.Unleashed.System.APs.Load
          history: 90d
          value_type: FLOAT
          units: '%'
          params: 'round(100 * last(//ruckus.Unleashed.System.Stats.Total.AP) / last(//ruckus.Unleashed.System.Licensed.APs),1)'
          tags:
            - tag: Application
              value: 'Access Points'
        - uuid: 9c4dc812cd4043ebb91ce7f43deed6f3
          name: 'Max Access Point Supported'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.12.0
          key: ruckus.Unleashed.System.Licensed.APs
          delay: 1h
          history: 90d
          tags:
            - tag: Application
              value: General
        - uuid: 392c90de73d847848d5a8303fe04a4a3
          name: 'Max Connections'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.13.0
          key: ruckus.Unleashed.System.Max.Sta
          delay: 1h
          history: 90d
          tags:
            - tag: Application
              value: General
        - uuid: e8c19cd90ba840119debd406fcc3bbd9
          name: 'Serial Number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.15.0
          key: ruckus.Unleashed.System.Serial.Number
          delay: 1h
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: 39a0dfd1c59d40fe9d181b6113eabfd5
          name: 'Total Users Capacity'
          type: CALCULATED
          key: ruckus.Unleashed.System.Sta.Load
          history: 90d
          value_type: FLOAT
          units: '%'
          params: 'round(100 * last(//ruckus.Unleashed.System.Stats.Total.Num.Sta) / last(//ruckus.Unleashed.System.Max.Sta),1)'
          tags:
            - tag: Application
              value: 'Access Points'
          triggers:
            - uuid: 4b25e528e58e41d4a24273bfea0bd9aa
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.System.Sta.Load,#3)>=80'
              name: 'Too many users connected'
              priority: AVERAGE
        - uuid: 1f026e983d9c41cf92c6b74c2de9b642
          name: 'CPU Utilization'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.13.0
          key: ruckus.Unleashed.System.Stats.CPU.Util
          history: 90d
          tags:
            - tag: Application
              value: 'Access Points'
          triggers:
            - uuid: 83a1235be9864d80b37376a86acb19d0
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.System.Stats.CPU.Util,#3)>={$CPU.UTIL.CRIT}'
              name: 'High CPU Usage'
              priority: AVERAGE
              manual_close: 'YES'
        - uuid: 8539325f87734da094cfc43f1ac87927
          name: 'Memory Utilization'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.14.0
          key: ruckus.Unleashed.System.Stats.Memory.Util
          history: 90d
          value_type: FLOAT
          units: '%'
          tags:
            - tag: Application
              value: 'Access Points'
          triggers:
            - uuid: c19f03c2545b4c3080ce4f3f59cabdbb
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.System.Stats.Memory.Util,#2)>={$MEMORY.UTIL.MAX}'
              name: 'High Memory Usage'
              priority: AVERAGE
              manual_close: 'YES'
        - uuid: 6ee47ae242e74808afc1d0638a8720a8
          name: 'Number of Access Point'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.1.0
          key: ruckus.Unleashed.System.Stats.Num.AP
          history: 90d
          tags:
            - tag: Application
              value: 'Access Points'
        - uuid: c302dab54b8146b6837ae610720717d2
          name: 'Users Connected'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.2.0
          key: ruckus.Unleashed.System.Stats.Num.Sta
          history: 90d
          units: users
          tags:
            - tag: Application
              value: 'Access Points'
        - uuid: c7b957588a94470881ac26bca87459bd
          name: 'Number of Registered Access Points'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.15.0
          key: ruckus.Unleashed.System.Stats.Total.AP
          history: 90d
          tags:
            - tag: Application
              value: 'Access Points'
        - uuid: 7f65705b24e349d8a8ad91fa9ab2a260
          name: 'Total Users Connected'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.30.0
          key: ruckus.Unleashed.System.Stats.Total.Num.Sta
          history: 90d
          units: users
          tags:
            - tag: Application
              value: 'Access Points'
        - uuid: 26613cafab324d4c964944c8aa64be06
          name: 'Associations Failed'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.16.0
          key: ruckus.Unleashed.System.Stats.WLAN.Total.Assoc.Fail
          delay: 1h
          history: 90d
          tags:
            - tag: Application
              value: 'Access Points'
        - uuid: d747c95a8c4e4fb4ba1652980ef6b1bc
          name: 'WLAN Total Rx Bytes'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.6.0
          key: ruckus.Unleashed.System.Stats.WLAN.Total.Rx.Bytes
          history: 90d
          units: Bps
          description: 'Total received bytes of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: f2bbe5d409ea4950a51e1120ea4b2026
          name: 'WLAN Total Tx Bytes'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.9.0
          key: ruckus.Unleashed.System.Stats.WLAN.Total.Tx.Bytes
          history: 90d
          units: Bps
          description: 'Total transmitted bytes of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: f035d2c915804363b8ea052be2778241
          name: 'WLAN Total Tx Fail'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.11.0
          key: ruckus.Unleashed.System.Stats.WLAN.Total.Tx.Fail
          history: 90d
          units: packet
          description: 'Total transmitted fail packets of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: d477800171034695bcfae3b4041bdd3a
          name: 'WLAN Total Tx Retry'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.12.0
          key: ruckus.Unleashed.System.Stats.WLAN.Total.Tx.Retry
          history: 90d
          units: packet
          description: 'Total transmitted retry packets of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: 643da7550cc34a279c595f62eb819924
          name: 'Firmware Version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.18.0
          key: ruckus.Unleashed.System.Version
          delay: 1h
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 37053648198549e4a6c5cb31ba452b93
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.System.Version,#1)<>last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.System.Version,#2)'
              name: 'Firmware version changed on {HOST.NAME}'
              priority: INFO
              manual_close: 'YES'
        - uuid: 7f8ffc3f69804adaba88ae9296105d41
          name: 'Device name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.1.0
          key: sys.Name
          delay: 1h
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: 909d902e92004a19b694dcabe5ff4535
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          history: 90d
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible value:
            0 - not available
            1 - available
            2 - unknown
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 3ab3c38cc31044fc807382f941607488
              expression: 'max(/Ruckus UnLeashed by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'No SNMP data collection'
              priority: AVERAGE
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              dependencies:
                - name: '{HOST.NAME} is unavailable by ICMP'
                  expression: 'max(/Ruckus UnLeashed by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: 92df177cd4d04362b84584b0fc353dfe
          name: 'Ruckus AP discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#AP.MAC},1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.1.6,{#AP.NAME},1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.2.6,{#AP.STATUS},1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.3.6,{#AP.MODEL},1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.4.6,{#AP.UPTIME},1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.6.6,{#AP.ROLE},1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.9.6]'
          key: ruckus.ap.discovery
          delay: 5m
          filter:
            conditions:
              - macro: '{#AP.MAC}'
                value: .+
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: d042a74646d241ba8b746fcca5b5b486
              name: 'AP Name [{#AP.MAC}]'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.2.6.{#SNMPINDEX}'
              key: 'ruckus.Unleashed.WLAN.AP.Description[{#SNMPINDEX}]'
              value_type: TEXT
              tags:
                - tag: ap
                  value: '{#AP.MAC}'
                - tag: ap_name
                  value: '{#AP.NAME}'
                - tag: component
                  value: ap
                - tag: model
                  value: '{#AP.MODEL}'
            - uuid: 0011d58c0de84b8ebf023048043ae92e
              name: 'AP MAC address [{#AP.MAC}]'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.1.6.{#SNMPINDEX}'
              key: 'ruckus.Unleashed.WLAN.AP.MacAddr[{#SNMPINDEX}]'
              value_type: TEXT
              tags:
                - tag: ap
                  value: '{#AP.MAC}'
                - tag: ap_name
                  value: '{#AP.NAME}'
                - tag: component
                  value: ap
                - tag: model
                  value: '{#AP.MODEL}'
            - uuid: cc298ec398bd47c3b8c7328d7edac41c
              name: 'AP Model [{#AP.MAC}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.4.6.{#SNMPINDEX}'
              key: 'ruckus.Unleashed.WLAN.AP.Model[{#SNMPINDEX}]'
              value_type: TEXT
              tags:
                - tag: ap
                  value: '{#AP.MAC}'
                - tag: ap_name
                  value: '{#AP.NAME}'
                - tag: component
                  value: ap
                - tag: model
                  value: '{#AP.MODEL}'
            - uuid: 939cbd07707c4c3985038340ce5e9cf3
              name: 'AP Role [{#AP.MAC}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.9.6.{#SNMPINDEX}'
              key: 'ruckus.Unleashed.WLAN.AP.Role[{#SNMPINDEX}]'
              delay: 5m
              trends: '0'
              valuemap:
                name: 'AP Role'
              tags:
                - tag: ap
                  value: '{#AP.MAC}'
                - tag: ap_name
                  value: '{#AP.NAME}'
                - tag: component
                  value: ap
                - tag: model
                  value: '{#AP.MODEL}'
              trigger_prototypes:
                - uuid: 47403760b1404d0ba3d70d939ac08a69
                  expression: 'last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.WLAN.AP.Role[{#SNMPINDEX}],#1)<>last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.WLAN.AP.Role[{#SNMPINDEX}],#2)'
                  name: 'AP {#AP.MAC} role changed'
                  priority: WARNING
                  manual_close: 'YES'
            - uuid: 5d005b3898bc4481b31f2ac92ec97b17
              name: 'AP Status [{#AP.MAC}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.3.6.{#SNMPINDEX}'
              key: 'ruckus.Unleashed.WLAN.AP.Status[{#SNMPINDEX}]'
              trends: '0'
              valuemap:
                name: RuckusAPStatus
              tags:
                - tag: ap
                  value: '{#AP.MAC}'
                - tag: ap_name
                  value: '{#AP.NAME}'
                - tag: component
                  value: ap
                - tag: model
                  value: '{#AP.MODEL}'
              trigger_prototypes:
                - uuid: 1cd520c5ee8c409bb39777093b11bb85
                  expression: 'max(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.WLAN.AP.Status[{#SNMPINDEX}],2m)=0'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.WLAN.AP.Status[{#SNMPINDEX}])=1'
                  name: 'AP {#AP.MAC} disconnected for 2 minutes'
                  priority: AVERAGE
                  dependencies:
                    - name: 'No SNMP data collection'
                      expression: 'max(/Ruckus UnLeashed by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
            - uuid: a1373e60b159457eb0dc9098aa7753cc
              name: 'AP Uptime [{#AP.MAC}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.6.6.{#SNMPINDEX}'
              key: 'ruckus.Unleashed.WLAN.AP.Uptime[{#SNMPINDEX}]'
              trends: '0'
              units: uptime
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              tags:
                - tag: ap
                  value: '{#AP.MAC}'
                - tag: ap_name
                  value: '{#AP.NAME}'
                - tag: component
                  value: ap
                - tag: model
                  value: '{#AP.MODEL}'
          trigger_prototypes:
            - uuid: 120511aaa04f4eceba67f4e1c766f635
              expression: |
                last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.WLAN.AP.Uptime[{#SNMPINDEX}])<10m
                and
                last(/Ruckus UnLeashed by SNMP/ruckus.Unleashed.WLAN.AP.Status[{#SNMPINDEX}])=1
              name: 'AP {#AP.MAC} restarted'
              priority: INFO
              description: 'The host uptime is less than 10 minutes.'
              manual_close: 'YES'
      tags:
        - tag: class
          value: network
        - tag: class
          value: wireless
        - tag: target
          value: ap
        - tag: target
          value: ruckus
      macros:
        - macro: '{$CPU.UTIL.CRIT}'
          value: '90'
        - macro: '{$MEMORY.UTIL.MAX}'
          value: '90'
        - macro: '{$SNMP.TIMEOUT}'
          value: 5m
      dashboards:
        - uuid: ba0742b91b0a48148679f7e6d72a25f4
          name: Overview
          pages:
            - name: Overview
              widgets:
                - type: item
                  name: 'AP Group Name'
                  width: '32'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'AP Group Name'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Ruckus UnLeashed by SNMP'
                        key: sys.Name
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '30'
                - type: gauge
                  name: 'CPU utilization'
                  'y': '3'
                  width: '18'
                  height: '4'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'CPU usage'
                    - type: INTEGER
                      name: desc_size
                      value: '10'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Ruckus UnLeashed by SNMP'
                        key: ruckus.Unleashed.System.Stats.CPU.Util
                    - type: STRING
                      name: max
                      value: '100'
                    - type: STRING
                      name: min
                      value: '0'
                    - type: INTEGER
                      name: scale_size
                      value: '10'
                    - type: STRING
                      name: thresholds.0.color
                      value: 0EC9AC
                    - type: STRING
                      name: thresholds.0.threshold
                      value: '0'
                    - type: STRING
                      name: thresholds.1.color
                      value: FFD54F
                    - type: STRING
                      name: thresholds.1.threshold
                      value: '80'
                    - type: STRING
                      name: thresholds.2.color
                      value: FF465C
                    - type: STRING
                      name: thresholds.2.threshold
                      value: '90'
                    - type: INTEGER
                      name: th_show_arc
                      value: '1'
                    - type: INTEGER
                      name: th_show_labels
                      value: '1'
                    - type: STRING
                      name: units
                      value: '%'
                - type: honeycomb
                  name: 'AP model'
                  'y': '7'
                  width: '72'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'AP Model [*]'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("^AP Model \[(.*)\]$", \1)}'
                    - type: STRING
                      name: reference
                      value: PCBHB
                    - type: INTEGER
                      name: secondary_label_decimal_places
                      value: '0'
                - type: honeycomb
                  name: 'AP role'
                  'y': '10'
                  width: '72'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'AP Role [*]'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("^AP Role \[(.*)\]$", \1)}'
                    - type: STRING
                      name: reference
                      value: MPGWF
                    - type: INTEGER
                      name: secondary_label_decimal_places
                      value: '0'
                    - type: STRING
                      name: thresholds.0.color
                      value: 0080FF
                    - type: STRING
                      name: thresholds.0.threshold
                      value: '1'
                - type: honeycomb
                  name: 'AP status'
                  'y': '13'
                  width: '72'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'AP Status [*]'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("^AP Status \[(.*)\]$", \1)}'
                    - type: STRING
                      name: reference
                      value: EBNSC
                    - type: INTEGER
                      name: secondary_label_decimal_places
                      value: '0'
                    - type: STRING
                      name: thresholds.0.color
                      value: F44336
                    - type: STRING
                      name: thresholds.0.threshold
                      value: '0'
