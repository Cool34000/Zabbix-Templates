zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: 8f9e939a66dc4d678279ff2ab8841120
      template: 'ICMP Ping 4G'
      name: 'ICMP Ping 4G'
      description: |
        Template Net ICMP Ping
        
        Generated by official Zabbix template tool "Templator"
      readme: |
        ## Setup
        
        Set `Threshold of ICMP packet loss` and `Threshold of the average ICMP response`
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 313f2ada796c4dbf9cf00b80f035e768
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          description: |
            The host accessibility by ICMP ping.
            
            0 - ICMP ping fails;
            1 - ICMP ping successful.
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 5b57facf0315435e945717626bfaf5d6
              expression: 'max(/ICMP Ping 4G/icmpping,#10)=0'
              name: 'ICMP Ping: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last ten attempts returned timeout. Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 22e688ab39ab4b44852625fa0368f65d
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          description: 'The percentage of lost packets.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: f91741c2eb494e1ea2a4a98dd11144cd
              expression: 'min(/ICMP Ping 4G/icmppingloss,40m)>{$ICMP_LOSS_WARN} and min(/ICMP Ping 4G/icmppingloss,40m)<100'
              name: 'ICMP Ping: High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: AVERAGE
              description: 'ICMP packets loss detected.'
              dependencies:
                - name: 'ICMP Ping: Unavailable by ICMP ping'
                  expression: 'max(/ICMP Ping 4G/icmpping,#10)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: c180afb3bfe94e8a9d62bdb51f4a8175
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          description: 'The ICMP ping response time (in seconds).'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 5cc37da918944a878373fe636dd6c455
              expression: 'avg(/ICMP Ping 4G/icmppingsec,30m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'ICMP Ping: High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Average ICMP response time is too high.'
              dependencies:
                - name: 'ICMP Ping: High ICMP ping loss'
                  expression: 'min(/ICMP Ping 4G/icmppingloss,40m)>{$ICMP_LOSS_WARN} and min(/ICMP Ping 4G/icmppingloss,40m)<100'
                - name: 'ICMP Ping: Unavailable by ICMP ping'
                  expression: 'max(/ICMP Ping 4G/icmpping,#10)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
      tags:
        - tag: class
          value: network
        - tag: target
          value: icmp
      macros:
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
          description: 'Warning threshold of ICMP packet loss in %.'
          config:
            type: TEXT
            priority: '1'
            section_name: Thresholds
            label: 'Threshold of ICMP packet loss'
            description: 'Warning threshold of ICMP packet loss in %. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'Warning threshold of the average ICMP response time in seconds.'
          config:
            type: TEXT
            priority: '2'
            section_name: Thresholds
            label: 'Threshold of the average ICMP response'
            description: 'Warning threshold of the average ICMP response time in seconds. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
      valuemaps:
        - uuid: 3e94f865ebd943af94705242affeb48a
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
  graphs:
    - uuid: 9084e9d29774470996efcf1ea4988f9c
      name: 'ICMP response time'
      graph_items:
        - color: 199C0D
          item:
            host: 'ICMP Ping 4G'
            key: icmppingsec
